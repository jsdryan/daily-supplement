<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1A1A1A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Justin 補充劑時間表</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F7F5F0; --card: #FFFFFF;
    --text: #1A1A1A; --text-2: #666660; --text-3: #999993;
    --border: rgba(0,0,0,0.08);
    --blue: #1A5FBF; --blue-bg: #EAF0FB;
    --green: #1A7A4A; --green-bg: #E8F5EE;
    --amber: #8A5A00; --amber-bg: #FFF3D6;
    --purple: #5A3AB7; --purple-bg: #F0ECFD;
    --teal: #0A6E5A; --teal-bg: #E0F5EF;
    --coral: #8A3020; --coral-bg: #FDEEE8;
    --gray: #555550; --gray-bg: #F0EFE8;
    --check: #1A7A4A;
    --radius: 12px; --radius-sm: 8px;
    --header-bg: #1A1A1A;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #121212; --card: #1E1E1E;
      --text: #E8E8E8; --text-2: #A0A0A0; --text-3: #707070;
      --border: rgba(255,255,255,0.1);
      --blue: #5B9BF0; --blue-bg: #1A2A40;
      --green: #4ADE80; --green-bg: #122A1E;
      --amber: #D4A017; --amber-bg: #2A2210;
      --purple: #9B7BF0; --purple-bg: #1E1638;
      --teal: #38D9A9; --teal-bg: #0D2A22;
      --coral: #E07060; --coral-bg: #2A1510;
      --gray: #A0A0A0; --gray-bg: #252525;
      --check: #4ADE80;
      --header-bg: #0A0A0A;
    }
  }
  [data-theme="dark"] {
    --bg: #121212; --card: #1E1E1E;
    --text: #E8E8E8; --text-2: #A0A0A0; --text-3: #707070;
    --border: rgba(255,255,255,0.1);
    --blue: #5B9BF0; --blue-bg: #1A2A40;
    --green: #4ADE80; --green-bg: #122A1E;
    --amber: #D4A017; --amber-bg: #2A2210;
    --purple: #9B7BF0; --purple-bg: #1E1638;
    --teal: #38D9A9; --teal-bg: #0D2A22;
    --coral: #E07060; --coral-bg: #2A1510;
    --gray: #A0A0A0; --gray-bg: #252525;
    --check: #4ADE80;
    --header-bg: #0A0A0A;
  }

  body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.3s, color 0.3s; -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }

  header { background: var(--header-bg); color: white; padding: 18px 20px 14px; position: sticky; top: 0; z-index: 100; }
  .header-row { display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  header .date { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 3px; }
  .header-actions { display: flex; gap: 6px; }
  .progress-wrap { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
  .progress-bar { flex: 1; height: 4px; background: rgba(255,255,255,0.15); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s ease, background 0.3s; width: 0%; }
  .progress-text { font-size: 11px; color: rgba(255,255,255,0.55); min-width: 36px; text-align: right; }

  .hdr-btn { background: none; border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; color: rgba(255,255,255,0.6); font-size: 16px; width: 34px; height: 34px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
  .hdr-btn:active { background: rgba(255,255,255,0.1); }

  .tabs { display: flex; background: var(--bg); position: sticky; top: 84px; z-index: 90; border-bottom: 1px solid var(--border); transition: background 0.3s; }
  .tab { flex: 1; text-align: center; padding: 11px 4px; font-size: 13px; font-weight: 500; color: var(--text-3); border: none; background: transparent; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; font-family: 'Noto Sans TC', sans-serif; }
  .tab.active { color: var(--text); border-bottom-color: var(--text); }
  .tab:focus-visible { outline: 2px solid var(--blue); outline-offset: -2px; }

  .page { display: none; padding: 16px; }
  .page.active { display: block; }
  .page-label { font-size: 11px; font-weight: 700; color: var(--text-3); letter-spacing: 0.8px; margin-bottom: 12px; margin-top: 2px; }

  .done-banner { display: none; background: var(--green-bg); border: 1px solid var(--check); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 13px; font-weight: 500; color: var(--check); text-align: center; margin-bottom: 12px; }
  .done-banner.show { display: block; animation: popIn 0.3s ease; }

  @keyframes popIn { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  @keyframes checkBounce { 0% { transform: scale(1); } 40% { transform: scale(1.25); } 100% { transform: scale(1); } }

  .section { margin-bottom: 18px; }
  .section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; padding: 9px 14px; background: var(--card); border-radius: var(--radius-sm); border: 1px solid var(--border); transition: background 0.3s; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .section-title { font-size: 13px; font-weight: 700; flex: 1; }
  .section-count { font-size: 11px; color: var(--text-3); }

  .item { display: flex; align-items: flex-start; gap: 10px; padding: 11px 14px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 5px; cursor: pointer; transition: background 0.15s, opacity 0.15s; -webkit-tap-highlight-color: transparent; user-select: none; }
  .item:last-child { margin-bottom: 0; }
  .item:active { background: var(--bg); }
  .item:focus-visible { outline: 2px solid var(--blue); outline-offset: -2px; }
  .item.checked { background: var(--green-bg); border-color: var(--check); opacity: 0.72; }
  .item.checked .checkbox { animation: checkBounce 0.25s ease; }

  .checkbox { width: 22px; height: 22px; border: 2px solid var(--text-3); border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; margin-top: 1px; background: var(--card); }
  .item.checked .checkbox { background: var(--check); border-color: var(--check); }
  .check-icon { display: none; width: 12px; height: 9px; position: relative; }
  .check-icon::after { content: ''; position: absolute; left: 1px; top: 1px; width: 10px; height: 7px; border-left: 2.5px solid white; border-bottom: 2.5px solid white; transform: rotate(-45deg); }
  .item.checked .check-icon { display: block; }

  .pill { display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; white-space: nowrap; min-width: 66px; text-align: center; flex-shrink: 0; }
  .pill-blue   { background: var(--blue-bg);   color: var(--blue); }
  .pill-green  { background: var(--green-bg);  color: var(--green); }
  .pill-amber  { background: var(--amber-bg);  color: var(--amber); }
  .pill-purple { background: var(--purple-bg); color: var(--purple); }
  .pill-teal   { background: var(--teal-bg);   color: var(--teal); }
  .pill-coral  { background: var(--coral-bg);  color: var(--coral); }
  .pill-gray   { background: var(--gray-bg);   color: var(--gray); }

  .item-body { flex: 1; }
  .item-name { font-size: 13px; font-weight: 500; line-height: 1.4; }
  .item-note { font-size: 12px; color: var(--text-2); margin-top: 3px; line-height: 1.5; }
  .item.checked .item-name { text-decoration: line-through; color: var(--text-3); }
  .item.checked .item-note { opacity: 0.55; }

  .note-box { background: var(--gray-bg); border-radius: var(--radius-sm); padding: 10px 14px; font-size: 12px; color: var(--text-2); margin-top: 8px; line-height: 1.6; transition: background 0.3s; }

  .reset-btn { width: 100%; margin-top: 16px; padding: 13px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; color: var(--text-2); cursor: pointer; font-family: 'Noto Sans TC', sans-serif; transition: background 0.15s; }
  .reset-btn:active { background: var(--bg); }
  .reset-btn:focus-visible { outline: 2px solid var(--blue); outline-offset: -2px; }

  .summary-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px 14px; margin-bottom: 12px; transition: background 0.3s; }
  .sum-row { display: flex; align-items: center; gap: 10px; padding: 11px 0; border-bottom: 1px solid var(--border); }
  .sum-row:last-child { border-bottom: none; }
  .sum-info { flex: 1; }
  .sum-name { font-size: 13px; font-weight: 600; }
  .sum-detail { font-size: 11px; color: var(--text-2); margin-top: 2px; line-height: 1.5; }
  .badge { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
  .badge-daily { background: var(--green-bg); color: var(--green); }
  .badge-train { background: var(--blue-bg); color: var(--blue); }
  .badge-opt   { background: var(--gray-bg); color: var(--gray); }

  .rules-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; transition: background 0.3s; }
  .rules-title { font-size: 13px; font-weight: 700; margin-bottom: 10px; }
  .rule-row { display: flex; gap: 10px; padding: 8px 0; font-size: 13px; line-height: 1.5; border-bottom: 1px solid var(--border); }
  .rule-row:last-child { border-bottom: none; }
  .rule-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
  .rule-text { color: var(--text-2); }
  .rule-text strong { color: var(--text); }

  .streak-bar { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: var(--amber-bg); border-radius: var(--radius-sm); margin-bottom: 12px; font-size: 13px; font-weight: 600; color: var(--amber); }
  .streak-bar .streak-num { font-size: 18px; }

  /* ── Stats ── */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; text-align: center; transition: background 0.3s; }
  .stat-value { font-size: 24px; font-weight: 700; }
  .stat-label { font-size: 11px; color: var(--text-2); margin-top: 4px; }

  /* ── History Calendar ── */
  .history-section { margin-bottom: 20px; }
  .history-title { font-size: 13px; font-weight: 700; margin-bottom: 10px; }
  .cal-header { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 11px; color: var(--text-3); margin-bottom: 4px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-cell { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 8px; font-size: 11px; font-weight: 500; color: var(--text-3); }
  .cal-cell.complete { background: var(--green-bg); color: var(--green); font-weight: 600; }
  .cal-cell.partial { background: var(--amber-bg); color: var(--amber); font-weight: 600; }
  .cal-cell.missed { background: var(--gray-bg); color: var(--text-3); }
  .cal-cell.future { opacity: 0.2; }
  .cal-cell.today { outline: 2px solid var(--blue); outline-offset: -2px; }
  .cal-legend { display: flex; gap: 12px; margin-top: 8px; font-size: 11px; color: var(--text-3); }
  .cal-legend-dot { display: inline-block; width: 10px; height: 10px; border-radius: 3px; vertical-align: middle; margin-right: 3px; }

  /* ── Modal ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; display: flex; align-items: flex-end; justify-content: center; animation: fadeIn 0.15s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal { background: var(--card); border-radius: 16px 16px 0 0; width: 100%; max-width: 480px; max-height: 85vh; overflow-y: auto; animation: slideUp 0.2s ease; }
  @keyframes slideUp { from { transform: translateY(40px); } to { transform: translateY(0); } }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--card); z-index: 1; }
  .modal-header h2 { font-size: 16px; font-weight: 700; }
  .modal-close { background: none; border: none; font-size: 22px; color: var(--text-2); cursor: pointer; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
  .modal-close:active { background: var(--bg); }
  .modal-body { padding: 16px 20px 32px; }

  /* ── Settings ── */
  .stg-section { margin-bottom: 20px; }
  .stg-title { font-size: 14px; font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .stg-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; }
  .stg-label { font-size: 13px; }
  .toggle { position: relative; width: 44px; height: 24px; background: var(--text-3); border-radius: 12px; cursor: pointer; transition: background 0.2s; flex-shrink: 0; border: none; }
  .toggle.on { background: var(--green); }
  .toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; background: white; border-radius: 50%; transition: transform 0.2s; }
  .toggle.on::after { transform: translateX(20px); }
  .notif-times { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
  .notif-row { display: flex; align-items: center; justify-content: space-between; }
  .notif-label { font-size: 13px; }
  .notif-time { padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; background: var(--card); color: var(--text); font-family: 'Noto Sans TC', sans-serif; }
  .stg-note { font-size: 11px; color: var(--text-3); margin-top: 6px; }

  /* ── Supplement Management ── */
  .stg-tabs { display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 12px; }
  .stg-tab { flex: 1; padding: 8px; text-align: center; font-size: 12px; font-weight: 500; border: none; background: var(--card); color: var(--text-2); cursor: pointer; font-family: 'Noto Sans TC', sans-serif; }
  .stg-tab.active { background: var(--blue); color: white; }
  .mg-section { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 10px; overflow: hidden; }
  .mg-section-hd { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: var(--bg); }
  .mg-section-title { flex: 1; font-size: 13px; font-weight: 600; }
  .mg-item { display: flex; align-items: center; gap: 8px; padding: 8px 14px; border-top: 1px solid var(--border); font-size: 12px; }
  .mg-item .pill { font-size: 10px; min-width: 56px; }
  .mg-item-info { flex: 1; }
  .mg-btn { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; font-size: 11px; cursor: pointer; color: var(--text-2); font-family: 'Noto Sans TC', sans-serif; }
  .mg-btn:active { background: var(--bg); }
  .mg-btn.danger { color: var(--coral); border-color: var(--coral); }
  .mg-add-row { padding: 8px 14px; border-top: 1px solid var(--border); }
  .mg-add-row .mg-btn { width: 100%; text-align: center; }

  /* ── Item Form ── */
  .frm-row { margin-bottom: 10px; }
  .frm-label { font-size: 11px; color: var(--text-2); margin-bottom: 4px; display: block; }
  .frm-input { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; background: var(--card); color: var(--text); font-family: 'Noto Sans TC', sans-serif; }
  .frm-input:focus { outline: 2px solid var(--blue); border-color: transparent; }
  .color-opts { display: flex; gap: 6px; flex-wrap: wrap; }
  .color-opt { width: 28px; height: 28px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: border-color 0.15s; }
  .color-opt.sel { border-color: var(--text); transform: scale(1.1); }
  .frm-actions { display: flex; gap: 8px; margin-top: 12px; }
  .frm-btn { flex: 1; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; background: var(--card); color: var(--text); }
  .frm-btn.primary { background: var(--blue); color: white; border-color: var(--blue); }
  .frm-btn:active { opacity: 0.8; }

  /* ── Data Buttons ── */
  .data-btns { display: flex; flex-direction: column; gap: 8px; }
  .data-btn { padding: 11px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; text-align: center; background: var(--card); color: var(--text); font-family: 'Noto Sans TC', sans-serif; transition: background 0.15s; }
  .data-btn:active { background: var(--bg); }
  .data-btn.danger { border-color: var(--coral); color: var(--coral); }

  /* ── Day Selector ── */
  .day-selector { display: flex; gap: 6px; }
  .day-chip { flex: 1; padding: 8px 0; text-align: center; font-size: 13px; font-weight: 600; border: 1.5px solid var(--border); border-radius: 8px; cursor: pointer; background: var(--card); color: var(--text-3); transition: all 0.2s; font-family: 'Noto Sans TC', sans-serif; }
  .day-chip:active { opacity: 0.7; }
  .day-chip.sel { background: var(--blue-bg); color: var(--blue); border-color: var(--blue); }

  /* ── Drag & Drop (long-press) ── */
  .mg-section, .mg-item { transition: transform 0.25s cubic-bezier(0.2,0,0,1), opacity 0.2s ease, box-shadow 0.2s ease; }
  .drag-ready { transform: scale(1.03); box-shadow: 0 4px 16px rgba(0,0,0,0.2); z-index: 10; position: relative; }
  .drag-ghost { position: fixed; z-index: 300; pointer-events: none; box-shadow: 0 8px 24px rgba(0,0,0,0.25); border-radius: var(--radius-sm); user-select: none; transition: transform 0.15s ease, opacity 0.15s ease; opacity: 0; transform: scale(0.97); }
  .drag-ghost.visible { opacity: 0.92; transform: scale(1.04); }
  .drag-placeholder { transition: height 0.25s cubic-bezier(0.2,0,0,1), opacity 0.15s ease, margin 0.25s cubic-bezier(0.2,0,0,1); }
  .drag-placeholder.collapsing { opacity: 0; height: 0 !important; margin: 0; }
  body.is-dragging { user-select: none; -webkit-user-select: none; overflow: hidden; }
  body.is-dragging .modal { overflow: hidden; }
  body.is-dragging .mg-section, body.is-dragging .mg-item { transition: transform 0.25s cubic-bezier(0.2,0,0,1), opacity 0.2s ease; }
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div>
      <h1>Justin 補充劑時間表</h1>
      <div class="date" id="today-date"></div>
    </div>
    <div class="header-actions">
      <button class="hdr-btn" id="theme-toggle" aria-label="切換深色模式"></button>
      <button class="hdr-btn" id="settings-btn" aria-label="設定" onclick="openSettings()">&#9881;</button>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="progress-text" id="progress-text"></div>
  </div>
</header>

<div class="tabs" role="tablist">
  <button class="tab active" role="tab" aria-selected="true" aria-controls="train" id="tab-train" onclick="showTab('train',this)" tabindex="0">訓練日</button>
  <button class="tab" role="tab" aria-selected="false" aria-controls="rest" id="tab-rest" onclick="showTab('rest',this)" tabindex="-1">休息日</button>
  <button class="tab" role="tab" aria-selected="false" aria-controls="summary" id="tab-summary" onclick="showTab('summary',this)" tabindex="-1">總覽</button>
</div>

<div id="train" class="page active" role="tabpanel" aria-labelledby="tab-train"></div>
<div id="rest" class="page" role="tabpanel" aria-labelledby="tab-rest"></div>
<div id="summary" class="page" role="tabpanel" aria-labelledby="tab-summary"></div>

<div id="settings-overlay" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeSettings()">
  <div class="modal">
    <div class="modal-header"><h2>設定</h2><button class="modal-close" onclick="closeSettings()">&times;</button></div>
    <div class="modal-body" id="settings-body"></div>
  </div>
</div>

<div id="item-overlay" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeItemForm()">
  <div class="modal" id="item-modal"></div>
</div>

<script>
// ══════════════════════════════════════
// ── Default Configuration ──
// ══════════════════════════════════════
function defaultConfig() {
  return {
    train: [
      { id:'ts1', title:'早餐時', dotColor:'#1A5FBF', items:[
        { id:'t1', pill:'Opti-Men', color:'blue', name:'1 顆，隨餐吞服', note:'早午晚各一，共 3 顆／天' },

// ══════════════════════════════════════
// ── Helpers ──
// ══════════════════════════════════════
function todayStr() { return formatDate(new Date()); }
function formatDate(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function isTrainingDay(d) {
  return getConfig().trainingDays.includes((d||new Date()).getDay());
}
function pageForDay(d) { return isTrainingDay(d) ? 'train' : 'rest'; }
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

function getDayLabels(config) {
  const names = ['日','一','二','三','四','五','六'];
  const td = config.trainingDays || [1,2,3,5,6];
  const trainNames = names.filter((_,i)=>td.includes(i)).map((n,i)=>i===0?'週'+n:n);
  const restNames  = names.filter((_,i)=>!td.includes(i)).map((n,i)=>i===0?'週'+n:n);
  return { train: trainNames.join(' '), rest: restNames.join(' ') };
}

  const raw = localStorage.getItem('supp_config');
  const c = raw ? JSON.parse(raw) : defaultConfig();
  if (!c.trainingDays) c.trainingDays = [1, 2, 3, 5, 6];
  return c;
}

function getChecks(date) {

}
function saveChecks(date, checks) {
  localStorage.setItem('supp_checks_'+date, JSON.stringify(checks));
}

// ══════════════════════════════════════
// ── Migration from old format ──
// ══════════════════════════════════════
function migrateOldData() {
  if (localStorage.getItem('supp_migrated_v2')) return;
  const cfg = defaultConfig();
  for (let i=0; i<30; i++) {
    const d = new Date(); d.setDate(d.getDate()-i);
    const ds = formatDate(d);
    ['train','rest'].forEach(page => {
      const oldKey = 'supp_'+page+'_'+ds;
      const raw = localStorage.getItem(oldKey);
      if (!raw) return;
      try {
        const bools = JSON.parse(raw);
        const allItems = cfg[page].flatMap(s=>s.items);
        const ids = [];
        bools.forEach((b,idx) => { if(b && allItems[idx]) ids.push(allItems[idx].id); });
        const existing = getChecks(ds);
        if (!existing[page] || existing[page].length===0) {
          existing[page] = ids;
          saveChecks(ds, existing);
        }
      } catch(e){}
      localStorage.removeItem(oldKey);
    });
  }
  localStorage.setItem('supp_migrated_v2','true');
}

function getProgressColor(p) { return p<40?'#FBBF24':p<75?'#34D399':'#4ADE80'; }
function updateProgress() {
  const active = document.querySelector('.page.active');
  const fill = document.getElementById('progress-fill');
  const text = document.getElementById('progress-text');
  if (!active || active.id==='summary') { fill.style.width='0%'; text.textContent=''; return; }
  const all = active.querySelectorAll('.item');
  const done = active.querySelectorAll('.item.checked').length;
  const total = all.length;
  const pct = total ? Math.round(done/total*100) : 0;
  fill.style.width = pct+'%';
  fill.style.background = getProgressColor(pct);
  text.textContent = done+' / '+total;
}

// ══════════════════════════════════════
// ── Render Checklist Pages ──
// ══════════════════════════════════════
function renderPage(pageId) {
  const config = getConfig();
  const sections = config[pageId];
  if (!sections) return;
  const checks = getChecks(todayStr());
  const checkedIds = checks[pageId] || [];
  let h = '';
  const dayLabels = getDayLabels(config);
  h += '<div class="page-label">'+dayLabels[pageId]+'</div>';
  h += '<div id="'+pageId+'-streak" class="streak-bar" style="display:none;"></div>';
  h += '<div id="'+pageId+'-done" class="done-banner">今日補充劑全部完成 ✓</div>';
  sections.forEach(sec => {
    const countText = sec.items.length+' 項'+(sec.countNote ? '，'+sec.countNote : '');
    h += '<div class="section">';
    h += '<div class="section-header"><div class="dot" style="background:'+sec.dotColor+';"></div><span class="section-title">'+sec.title+'</span><span class="section-count">'+countText+'</span></div>';
    sec.items.forEach(item => {
      const ck = checkedIds.includes(item.id);
      h += '<div class="item'+(ck?' checked':'')+'" role="checkbox" aria-checked="'+ck+'" tabindex="0" data-id="'+item.id+'" data-page="'+pageId+'">';
      h += '<div class="checkbox"><div class="check-icon"></div></div>';
      h += '<span class="pill pill-'+item.color+'">'+item.pill+'</span>';
      h += '<div class="item-body"><div class="item-name">'+item.name+'</div>';
      if (item.note) h += '<div class="item-note">'+item.note+'</div>';
      h += '</div></div>';
    });
    h += '</div>';
  });
  h += '<div class="note-box">'+config.notes[pageId]+'</div>';
  h += '<button class="reset-btn" onclick="resetPage(\''+pageId+'\')">重設今日打勾</button>';
  document.getElementById(pageId).innerHTML = h;
  // Bind events
  document.getElementById(pageId).querySelectorAll('.item').forEach(el => {
    el.addEventListener('click', () => toggleItem(el));
    el.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' '){e.preventDefault();toggleItem(el);} });
  });
  // Done banner
  const allItems = sections.flatMap(s=>s.items);
  const banner = document.getElementById(pageId+'-done');
  if (banner) banner.classList.toggle('show', allItems.length>0 && allItems.every(it=>checkedIds.includes(it.id)));
}

// ══════════════════════════════════════
// ── Toggle & Reset ──
// ══════════════════════════════════════
function toggleItem(el) {
  const id = el.dataset.id, page = el.dataset.page;
  const isChecked = el.classList.toggle('checked');
  el.setAttribute('aria-checked', String(isChecked));
  if (navigator.vibrate) navigator.vibrate(10);
  const date = todayStr();
  const checks = getChecks(date);
  if (!checks[page]) checks[page] = [];
  if (isChecked) { if(!checks[page].includes(id)) checks[page].push(id); }
  else { checks[page] = checks[page].filter(x=>x!==id); }
  saveChecks(date, checks);
  updateProgress();
  checkDayComplete(page);
}

function resetPage(page) {
  if (!confirm('確定要重設今日所有打勾嗎？')) return;
  const date = todayStr();
  const checks = getChecks(date);
  checks[page] = [];
  saveChecks(date, checks);
  const streak = JSON.parse(localStorage.getItem('supp_streak')||'{}');
  delete streak[date];
  localStorage.setItem('supp_streak', JSON.stringify(streak));
  renderPage(page);
  updateProgress();
  updateStreak();
}

// ══════════════════════════════════════
// ── Streak (fixed logic) ──
// ══════════════════════════════════════
function checkDayComplete(page) {
  const config = getConfig();
  const date = todayStr();
  const checks = getChecks(date);
  const correctPage = pageForDay(new Date());
  const allItems = config[correctPage].flatMap(s=>s.items);
  const checkedIds = checks[correctPage] || [];
  const complete = allItems.length>0 && allItems.every(it=>checkedIds.includes(it.id));
  const streak = JSON.parse(localStorage.getItem('supp_streak')||'{}');
  if (complete) streak[date]=true; else delete streak[date];
  localStorage.setItem('supp_streak', JSON.stringify(streak));
  updateStreak();
  // Banner
  const banner = document.getElementById(page+'-done');
  const pageItems = config[page].flatMap(s=>s.items);
  const pageChecked = checks[page]||[];
  if (banner) banner.classList.toggle('show', pageItems.length>0 && pageItems.every(it=>pageChecked.includes(it.id)));
}

function getStreak() {
  const data = JSON.parse(localStorage.getItem('supp_streak')||'{}');
  let streak = 0;
  const d = new Date();
  if (data[todayStr()]) streak++;
  for (let i=1;i<365;i++) {
    const prev = new Date(d); prev.setDate(prev.getDate()-i);
    if (data[formatDate(prev)]) streak++; else break;
  }
  return streak;
}

function updateStreak() {
  const streak = getStreak();
  ['train','rest'].forEach(page => {
    const bar = document.getElementById(page+'-streak');
    if (!bar) return;
    if (streak>1) { bar.style.display='flex'; bar.innerHTML='<span class="streak-num">&#128293; '+streak+'</span> 天連續完成'; }
    else if (streak===1) { bar.style.display='flex'; bar.innerHTML='<span class="streak-num">&#9989; 1</span> 天已完成，繼續保持！'; }
    else bar.style.display='none';
  });
}

function renderSummary() {
  const config = getConfig();
  let h = '';
  h += buildStats(config);
  h += buildHistory(config);
  // Supplement reference
  h += '<div class="summary-card">';
  config.summary.forEach(item => {
    const bc = item.badge==='daily'?'badge-daily':item.badge==='training'?'badge-train':'badge-opt';
    const bt = item.badge==='daily'?'每天':item.badge==='training'?'訓練日':'依需求';
    h += '<div class="sum-row"><span class="pill pill-'+item.color+'" style="min-width:70px;text-align:center;">'+item.pill+'</span>';
    h += '<div class="sum-info"><div class="sum-name">'+item.fullName+'</div><div class="sum-detail">'+item.detail+'</div></div>';
    h += '<span class="badge '+bc+'">'+bt+'</span></div>';
  });
  h += '</div>';
  // Rules
  h += '<div class="rules-card"><div class="rules-title">重要原則</div>';
  config.rules.forEach(r => { h += '<div class="rule-row"><span class="rule-icon">'+r.icon+'</span><span class="rule-text">'+r.text+'</span></div>'; });
  h += '</div>';
  h += '<div style="text-align:center;margin-top:20px;padding-bottom:8px;"><p style="font-size:11px;color:var(--text-3);">Justin · 2026.03</p></div>';
  document.getElementById('summary').innerHTML = h;
}

function buildStats(config) {
  const today = new Date();
  const weekStart = new Date(today);
  weekStart.setDate(weekStart.getDate()-((today.getDay()+6)%7));
  weekStart.setHours(0,0,0,0);
  let wT=0,wD=0,mT=0,mD=0;
  const missed = {};
  for (let i=0;i<30;i++) {
    const d = new Date(today); d.setDate(d.getDate()-i); d.setHours(0,0,0,0);
    const ds = formatDate(d);
    const pg = pageForDay(d);
    const items = config[pg].flatMap(s=>s.items);
    const ck = (getChecks(ds)[pg]||[]);
    const isWeek = d>=weekStart;
    items.forEach(it => {
      mT++;
      if(isWeek) wT++;
      if(ck.includes(it.id)) { mD++; if(isWeek) wD++; }
      else { missed[it.pill]=(missed[it.pill]||0)+1; }
    });
  }
  const wPct = wT?Math.round(wD/wT*100):0;
  const mPct = mT?Math.round(mD/mT*100):0;
  const colorFor = p => p>=80?'green':p>=50?'amber':'coral';
  let h = '<div class="stats-grid">';
  h += '<div class="stat-card"><div class="stat-value" style="color:var(--'+colorFor(wPct)+');">'+wPct+'%</div><div class="stat-label">本週完成率</div></div>';
  h += '<div class="stat-card"><div class="stat-value" style="color:var(--'+colorFor(mPct)+');">'+mPct+'%</div><div class="stat-label">近 30 天完成率</div></div>';
  h += '</div>';
  const top3 = Object.entries(missed).sort((a,b)=>b[1]-a[1]).slice(0,3);
  if (top3.length>0) {
    h += '<div class="note-box" style="margin-bottom:16px;"><div style="font-weight:600;margin-bottom:6px;">最常漏掉的補充品</div>';
    top3.forEach(([name,cnt])=>{ h+='<div style="font-size:12px;">· '+name+'（'+cnt+' 次）</div>'; });
    h += '</div>';
  }
  return h;
}

function buildHistory(config) {
  const today = new Date(); today.setHours(0,0,0,0);
  const start = new Date(today); start.setDate(start.getDate()-34);
  while(start.getDay()!==1) start.setDate(start.getDate()-1);
  let h = '<div class="history-section"><div class="history-title">最近完成紀錄</div>';
  h += '<div class="cal-header"><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span></div>';
  h += '<div class="cal-grid">';
  const d = new Date(start);
  while(true) {
    const ds = formatDate(d);
    const isToday = ds===todayStr();
    const isFuture = d>today;
    if (isFuture) {
      h += '<div class="cal-cell future">'+d.getDate()+'</div>';
    } else {
      const pg = pageForDay(d);
      const items = config[pg].flatMap(s=>s.items);
      const ck = (getChecks(ds)[pg]||[]);
      const pct = items.length ? ck.length/items.length : 0;
      let cls = pct===1?'complete':pct>0?'partial':'missed';
      h += '<div class="cal-cell '+cls+(isToday?' today':'')+'">'+d.getDate()+'</div>';
    }
    d.setDate(d.getDate()+1);
    if(d>today && d.getDay()===1) break;
  }
  h += '</div>';
  h += '<div class="cal-legend">';
  h += '<span><span class="cal-legend-dot" style="background:var(--green-bg);"></span>全部完成</span>';
  h += '<span><span class="cal-legend-dot" style="background:var(--amber-bg);"></span>部分完成</span>';
  h += '<span><span class="cal-legend-dot" style="background:var(--gray-bg);"></span>未完成</span>';
  h += '</div></div>';
  return h;
}

    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('supp_theme', next);
    updateThemeIcon();
  });
}

  btn.textContent = isDark?'☀️':'🌙';
}

    if (!s.enabled || Notification.permission!=='granted') return;
    const now = new Date();
    const hm = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
    const key = todayStr();
    const slots = [
      { k:'morning', time:s.times.morning, msg:'早餐時間到了，記得吃補充劑！' },
      { k:'lunch', time:s.times.lunch, msg:'午餐時間到了，記得吃 Opti-Men！' },
      { k:'dinner', time:s.times.dinner, msg:'晚餐時間到了，記得吃補充劑！' }
    ];
    slots.forEach(slot=>{
      const nk = key+'_'+slot.k;
      if (hm===slot.time && !notifiedSlots[nk]) {
        notifiedSlots[nk]=true;
        new Notification('補充劑提醒', { body:slot.msg, icon:'icon-192.png' });
      }
    });
  }, 30000);
}

function buildManageSections(page, config) {
  const sections = config[page];
  let h = '';
  sections.forEach((sec,si) => {
    h += '<div class="mg-section" data-drag-type="section" data-page="'+page+'" data-si="'+si+'">';
    h += '<div class="mg-section-hd"><div class="dot" style="background:'+sec.dotColor+';"></div>';
    h += '<span class="mg-section-title">'+sec.title+'</span>';
    h += '<button class="mg-btn danger" onclick="deleteSection(\''+page+'\','+si+')" title="刪除">&#10005;</button></div>';
    sec.items.forEach((item,ii) => {
      h += '<div class="mg-item" data-drag-type="item" data-page="'+page+'" data-si="'+si+'" data-ii="'+ii+'">';
      h += '<span class="pill pill-'+item.color+'">'+item.pill+'</span>';
      h += '<span class="mg-item-info">'+item.name+'</span>';
      h += '<button class="mg-btn" onclick="editItem(\''+page+'\','+si+','+ii+')">編輯</button> ';
      h += '<button class="mg-btn danger" onclick="deleteItem(\''+page+'\','+si+','+ii+')">&#10005;</button>';
      h += '</div>';
    });
    h += '<div class="mg-add-row"><button class="mg-btn" onclick="addItem(\''+page+'\','+si+')">+ 新增補充品</button></div>';
    h += '</div>';
  });
  return h;
}

// ── Drag & Drop Engine (long-press + ghost + live reorder) ──
let dragState = null;
let longPressTimer = null;
const LONG_PRESS_MS = 400;
const MOVE_THRESHOLD = 8;

function preventTouchScroll(e) {
  if (dragState && dragState.phase === 'dragging') e.preventDefault();
}

function initDrag() {
  const root = document.getElementById('settings-body');
  if (!root) return;
  root.addEventListener('pointerdown', onPointerDown);
  root.addEventListener('pointermove', onPointerMove);
  root.addEventListener('pointerup', onPointerUp);
  root.addEventListener('pointercancel', onPointerUp);
  // iOS Safari: pointerEvent.preventDefault() does NOT stop scrolling.
  // Must intercept touchmove with { passive: false } to truly prevent scroll.
  root.addEventListener('touchmove', preventTouchScroll, { passive: false });
}

function onPointerDown(e) {
  if (e.target.closest('button') || e.target.closest('input') || e.target.closest('select')) return;
  const item = e.target.closest('.mg-item[data-drag-type]');
  const section = e.target.closest('.mg-section[data-drag-type]');
  if (!item && !section) return;
  const el = item || section;

  clearTimeout(longPressTimer);
  dragState = { phase: 'pending', el, startX: e.clientX, startY: e.clientY, pointerId: e.pointerId };
  longPressTimer = setTimeout(() => {
    if (!dragState || dragState.phase !== 'pending') return;
    if (navigator.vibrate) navigator.vibrate(30);
    activateDrag(el, dragState.pointerId, dragState.startY);
  }, LONG_PRESS_MS);
}

function activateDrag(el, pointerId, startY) {
  const type = el.dataset.dragType;
  const page = el.dataset.page;
  const origSi = Number(el.dataset.si);
  const origIi = el.dataset.ii !== undefined ? Number(el.dataset.ii) : null;
  const rect = el.getBoundingClientRect();

  // Ghost: floating clone that follows finger (fade in)
  const ghost = el.cloneNode(true);
  ghost.classList.add('drag-ghost');
  ghost.style.width = rect.width + 'px';
  ghost.style.left = rect.left + 'px';
  ghost.style.top = rect.top + 'px';
  document.body.appendChild(ghost);
  // Trigger reflow, then animate in
  ghost.offsetHeight;
  ghost.classList.add('visible');

  // Placeholder: keep space, fade out smoothly
  el.classList.add('drag-placeholder');
  el.style.height = rect.height + 'px';
  el.style.opacity = '0';

  el.setPointerCapture(pointerId);
  el.style.touchAction = 'none';
  document.body.classList.add('is-dragging');
  window.getSelection().removeAllRanges();

  dragState = {
    phase: 'dragging', type, page,
    origSi, origIi,       // original config indices (never change)
    curIdx: type === 'section' ? origSi : origIi, // tracks visual position
    el, ghost, pointerId,
    offsetY: startY - rect.top
  };
}

function getSiblings(type, page, si) {
  const root = document.getElementById('settings-body');
  if (type === 'section') {
    return Array.from(root.querySelectorAll('.mg-section[data-page="'+page+'"]'));
  }
  return Array.from(root.querySelectorAll('.mg-item[data-page="'+page+'"][data-si="'+si+'"]'));
}

function onPointerMove(e) {
  if (!dragState) return;

  if (dragState.phase === 'pending') {
    const dx = e.clientX - dragState.startX, dy = e.clientY - dragState.startY;
    if (Math.abs(dx) > MOVE_THRESHOLD || Math.abs(dy) > MOVE_THRESHOLD) cancelDrag();
    return;
  }

  if (dragState.phase !== 'dragging') return;
  e.preventDefault();

  const { type, page, origSi, el, ghost, offsetY } = dragState;
  // Move ghost with finger
  ghost.style.top = (e.clientY - offsetY) + 'px';

  // Get current siblings in DOM order
  const siblings = getSiblings(type, page, origSi);
  const elVisualIdx = siblings.indexOf(el);

  // Find which sibling the finger is over (by midpoint)
  let swapTarget = -1;
  for (let i = 0; i < siblings.length; i++) {
    if (i === elVisualIdx) continue;
    const r = siblings[i].getBoundingClientRect();
    const mid = r.top + r.height / 2;
    // Moving up: finger above sibling midpoint, sibling is above us
    if (i < elVisualIdx && e.clientY < mid) { swapTarget = i; break; }
    // Moving down: finger below sibling midpoint, sibling is below us
    if (i > elVisualIdx && e.clientY > mid) { swapTarget = i; }
  }

  // Live DOM swap with FLIP animation — siblings slide smoothly
  if (swapTarget !== -1 && swapTarget !== elVisualIdx) {
    // FLIP: First — record positions before swap
    const rects = new Map();
    siblings.forEach(sib => { if (sib !== el) rects.set(sib, sib.getBoundingClientRect()); });

    // Perform DOM swap
    const parent = el.parentNode;
    if (swapTarget < elVisualIdx) {
      parent.insertBefore(el, siblings[swapTarget]);
    } else {
      const after = siblings[swapTarget].nextSibling;
      parent.insertBefore(el, after);
    }

    // FLIP: Last + Invert + Play — animate displaced siblings
    rects.forEach((oldRect, sib) => {
      const newRect = sib.getBoundingClientRect();
      const dy = oldRect.top - newRect.top;
      if (Math.abs(dy) > 0.5) {
        sib.style.transition = 'none';
        sib.style.transform = 'translateY(' + dy + 'px)';
        sib.offsetHeight; // force reflow
        sib.style.transition = 'transform 0.25s cubic-bezier(0.2,0,0,1)';
        sib.style.transform = '';
      }
    });

    dragState.curIdx = swapTarget;
  }
}

function onPointerUp(e) {
  if (!dragState) { clearTimeout(longPressTimer); return; }
  if (dragState.phase !== 'dragging') { cancelDrag(); return; }

  const { type, page, origSi, origIi, curIdx, el, ghost } = dragState;
  const fromIdx = type === 'section' ? origSi : origIi;

  // Animate ghost back to placeholder position
  const placeholderRect = el.getBoundingClientRect();
  ghost.style.transition = 'all 0.2s cubic-bezier(0.2,0,0,1)';
  ghost.style.top = placeholderRect.top + 'px';
  ghost.style.left = placeholderRect.left + 'px';
  ghost.style.transform = 'scale(1)';
  ghost.style.opacity = '0.5';
  ghost.style.boxShadow = '0 2px 8px rgba(0,0,0,0.1)';

  // After animation, clean up and apply config
  const cleanup = () => {
    if (ghost && ghost.parentNode) ghost.remove();
    el.classList.remove('drag-placeholder');
    el.style.height = '';
    el.style.opacity = '';
    el.style.touchAction = '';
    document.body.classList.remove('is-dragging');

    if (fromIdx !== curIdx) {
      const c = getConfig();
      if (type === 'section') {
        const [moved] = c[page].splice(fromIdx, 1);
        c[page].splice(curIdx, 0, moved);
      } else {
        const items = c[page][origSi].items;
        const [moved] = items.splice(fromIdx, 1);
        items.splice(curIdx, 0, moved);
      }
      saveConfig(c);
    }

    renderSettingsBody();
    renderPage('train'); renderPage('rest');
    updateProgress();
    dragState = null;
  };

  ghost.addEventListener('transitionend', cleanup, { once: true });
  // Fallback in case transitionend doesn't fire
  setTimeout(cleanup, 250);
}

function cancelDrag() {
  clearTimeout(longPressTimer);
  document.body.classList.remove('is-dragging');
  if (dragState) {
    if (dragState.ghost && dragState.ghost.parentNode) dragState.ghost.remove();
    if (dragState.el) {
      dragState.el.classList.remove('drag-placeholder', 'drag-ready');
      dragState.el.style.height = '';
      dragState.el.style.touchAction = '';
    }
  }
  dragState = null;
}

// ── Training Day Toggle ──
function toggleTrainingDay(dayNum) {
  const c = getConfig();
  const idx = c.trainingDays.indexOf(dayNum);
  if (idx > -1) {
    if (c.trainingDays.length <= 1) { alert('至少要保留一個訓練日'); return; }
    c.trainingDays.splice(idx, 1);
  } else {
    c.trainingDays.push(dayNum);
    c.trainingDays.sort((a,b)=>a-b);
  }
  saveConfig(c);
  renderSettingsBody();
  renderPage('train'); renderPage('rest');
  updateDate(); autoSelectTab(); updateProgress();
}

// ── Notification Helpers ──
function toggleNotif(btn) {
  const s = getNotifSettings();
  if (!s.enabled && 'Notification' in window && Notification.permission==='default') {
    Notification.requestPermission().then(perm => {
      if (perm==='granted') { s.enabled=true; saveNotifSettings(s); renderSettingsBody(); }
      else alert('通知權限被拒絕，請在瀏覽器設定中開啟。');
    });
  } else {
    s.enabled = !s.enabled;
    saveNotifSettings(s);
    renderSettingsBody();
  }
}
function setNotifTime(slot,val) {
  const s = getNotifSettings();
  s.times[slot] = val;
  saveNotifSettings(s);
}

// ── Supplement CRUD ──
function deleteSection(page,si) {
  if (!confirm('確定要刪除此時段及其所有補充品？')) return;
  const c = getConfig(); c[page].splice(si,1); saveConfig(c);
  renderSettingsBody(); renderPage(page); updateProgress();
}

function deleteItem(page,si,ii) {
  if (!confirm('確定要刪除此補充品？')) return;
  const c = getConfig(); c[page][si].items.splice(ii,1); saveConfig(c);
  renderSettingsBody(); renderPage(page); updateProgress();
}

function addSection(page) {
  const title = prompt('輸入新時段名稱（例：睡前）');
  if (!title) return;
  const c = getConfig();
  c[page].push({ id:'sec_'+uid(), title:title, dotColor:'#555550', items:[] });
  saveConfig(c); renderSettingsBody(); renderPage(page);
}

function addItem(page,si) { showItemForm(page,si,null); }
function editItem(page,si,ii) { showItemForm(page,si,ii); }

// ── Item Form Modal ──
const COLORS = ['blue','green','amber','purple','teal','coral','gray'];
const COLOR_CSS = { blue:'var(--blue)', green:'var(--green)', amber:'var(--amber)', purple:'var(--purple)', teal:'var(--teal)', coral:'var(--coral)', gray:'var(--gray)' };

function showItemForm(page,si,ii) {
  const config = getConfig();
  const isEdit = ii!==null && ii!==undefined;
  const item = isEdit ? config[page][si].items[ii] : { pill:'',color:'blue',name:'',note:'' };
  let h = '<div class="modal-header"><h2>'+(isEdit?'編輯':'新增')+'補充品</h2><button class="modal-close" onclick="closeItemForm()">&times;</button></div>';
  h += '<div class="modal-body">';
  h += '<div class="frm-row"><label class="frm-label">名稱</label><input class="frm-input" id="frm-pill" value="'+escHtml(item.pill)+'" placeholder="例：魚油"></div>';
  h += '<div class="frm-row"><label class="frm-label">顏色</label><div class="color-opts">';
  COLORS.forEach(c => { h += '<div class="color-opt'+(c===item.color?' sel':'')+'" style="background:'+COLOR_CSS[c]+';" data-color="'+c+'" onclick="pickColor(this)"></div>'; });
  h += '</div></div>';
  h += '<div class="frm-row"><label class="frm-label">劑量說明</label><input class="frm-input" id="frm-name" value="'+escHtml(item.name)+'" placeholder="例：1 顆，隨餐"></div>';
  h += '<div class="frm-row"><label class="frm-label">備註（選填）</label><input class="frm-input" id="frm-note" value="'+escHtml(item.note||'')+'" placeholder="例：空腹吃容易不舒服"></div>';
  h += '<div class="frm-actions"><button class="frm-btn" onclick="closeItemForm()">取消</button>';
  h += '<button class="frm-btn primary" onclick="saveItemForm(\''+page+'\','+si+','+(isEdit?ii:'null')+')">'+(isEdit?'儲存':'新增')+'</button></div>';
  h += '</div>';
  document.getElementById('item-modal').innerHTML = h;
  document.getElementById('item-overlay').style.display='flex';
}

function closeItemForm() { document.getElementById('item-overlay').style.display='none'; }

function pickColor(el) {
  el.parentNode.querySelectorAll('.color-opt').forEach(e=>e.classList.remove('sel'));
  el.classList.add('sel');
}

function saveItemForm(page,si,ii) {
  const pill = document.getElementById('frm-pill').value.trim();
  const name = document.getElementById('frm-name').value.trim();
  const note = document.getElementById('frm-note').value.trim();
  const colorEl = document.querySelector('.color-opt.sel');
  const color = colorEl ? colorEl.dataset.color : 'blue';
  if (!pill) { alert('請輸入名稱'); return; }
  if (!name) { alert('請輸入劑量說明'); return; }
  const c = getConfig();
  if (ii!==null) {
    const item = c[page][si].items[ii];
    item.pill=pill; item.color=color; item.name=name; item.note=note;
  } else {
    c[page][si].items.push({ id:'i_'+uid(), pill, color, name, note });
  }
  saveConfig(c);
  closeItemForm();
  renderSettingsBody();
  renderPage(page);
  updateProgress();
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Export / Import ──
function exportData() {
  const data = {};
  for (let i=0;i<localStorage.length;i++) {
    const k = localStorage.key(i);
    if (k.startsWith('supp_')) data[k] = localStorage.getItem(k);
  }
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='supplement-data-'+todayStr()+'.json'; a.click();
  URL.revokeObjectURL(url);
}

function importData() {
  const input = document.createElement('input');
  input.type='file'; input.accept='.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        let count = 0;
        Object.entries(data).forEach(([k,v])=>{ if(k.startsWith('supp_')){localStorage.setItem(k,v);count++;} });
        alert('已匯入 '+count+' 筆資料，頁面將重新載入。');
        location.reload();
      } catch(e) { alert('匯入失敗：檔案格式不正確'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function resetToDefaults() {
  if (!confirm('確定要重設所有補充品設定為預設值？（打勾紀錄會保留）')) return;
  localStorage.removeItem('supp_config');
  renderSettingsBody();
  renderPage('train'); renderPage('rest');
  updateProgress();
  alert('已重設為預設值');
}

// ══════════════════════════════════════
// ── Clean up old storage (30 days) ──
// ══════════════════════════════════════
function cleanOldStorage() {
  const today = new Date();
  for (let i=0;i<localStorage.length;i++) {
    const k = localStorage.key(i);
    if (!k || !k.startsWith('supp_checks_')) continue;
    const ds = k.replace('supp_checks_','');
    const d = new Date(ds);
    if (isNaN(d.getTime())) continue;
    if ((today-d)/(1000*60*60*24)>30) localStorage.removeItem(k);
  }
}

// ══════════════════════════════════════
// ── Service Worker ──
// ══════════════════════════════════════
function registerSW() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }
}

migrateOldData();
updateDate();
initTheme();
renderPage('train');
renderPage('rest');
autoSelectTab();
updateProgress();
updateStreak();
cleanOldStorage();
registerSW();
initNotifications();
document.addEventListener('contextmenu', e => e.preventDefault());
